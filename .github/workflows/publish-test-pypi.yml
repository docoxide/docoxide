name: Publish to TestPyPI

on:
  push:
    tags:
      - "all-v*"
      - "python-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.platform.os }} ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: linux, runner: ubuntu-latest, target: x86_64 }
          - { os: linux, runner: ubuntu-latest, target: aarch64 }
          - { os: macos, runner: macos-latest, target: x86_64 }
          - { os: macos, runner: macos-latest, target: aarch64 }
          - { os: windows, runner: windows-latest, target: x64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - name: Build wheel
        uses: PyO3/maturin-action@v1.50.1
        with:
          working-directory: bindings/python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ matrix.platform.target != 'aarch64' }}
          manylinux: auto
          before-script-linux: yum install -y fontconfig-devel || apk add fontconfig-dev || (apt-get update && apt-get install -y libfontconfig1-dev)

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: bindings/python/dist

  publish:
    name: Publish to TestPyPI
    needs: [build-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
