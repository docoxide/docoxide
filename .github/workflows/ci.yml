name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (native)
        run: cargo clippy --workspace --all-targets --exclude docoxide-wasm -- -D warnings

      - name: Clippy (wasm)
        run: cargo clippy --target wasm32-unknown-unknown -p docoxide -p docoxide-wasm --lib -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2.75.19
        with:
          tool: cargo-deny

      - name: Cargo deny
        run: cargo deny check

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Run tests
        run: cargo test -p docoxide --test convert -- --test-threads=1

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Build and test
        working-directory: bindings/python
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest
          maturin develop --release
          pytest tests/test_api.py -q

  test-wasm:
    name: Test (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2.75.19
        with:
          tool: wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"

      - name: Build and test
        run: |
          cd bindings/wasm && wasm-pack build --target nodejs --out-dir pkg-nodejs
          cd ../..
          node --test bindings/wasm/tests/api.test.js
