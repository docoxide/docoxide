name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.platform.os }} ${{ matrix.platform.target }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'all-v') ||
      startsWith(github.event.release.tag_name, 'python-v')
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: linux, runner: ubuntu-latest, target: x86_64 }
          - { os: linux, runner: ubuntu-latest, target: aarch64 }
          - { os: macos, runner: macos-latest, target: x86_64 }
          - { os: macos, runner: macos-latest, target: aarch64 }
          - { os: windows, runner: windows-latest, target: x64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Build wheel
        uses: PyO3/maturin-action@v1.50.1
        with:
          working-directory: bindings/python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: bindings/python/dist

  build-sdist:
    name: Build sdist
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'all-v') ||
      startsWith(github.event.release.tag_name, 'python-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Build sdist
        uses: PyO3/maturin-action@v1.50.1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: wheels-sdist
          path: bindings/python/dist

  publish:
    name: Publish to PyPI
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'all-v') ||
      startsWith(github.event.release.tag_name, 'python-v')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true
