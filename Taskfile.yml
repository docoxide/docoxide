# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  rust:
    desc: Run the Rust docoxide CLI
    cmds:
      - cargo run -q -p docoxide -- {{.CLI_ARGS}}

  python:
    desc: Run the Python docoxide CLI (rebuilds the extension if sources changed)
    dir: bindings/python
    cmds:
      - uv run --with maturin maturin develop --quiet
      - uv run docoxide {{.CLI_ARGS}}

  wasm:
    desc: Run the WASM docoxide CLI via node
    deps: [build:wasm]
    dir: bindings/wasm
    cmds:
      - node cli.cjs {{.CLI_ARGS}}

  test:
    desc: Run all tests (Rust, Python, WASM)
    cmds:
      - task: test:rust
      - task: test:python
      - task: test:wasm

  build:wasm:
    desc: Build WASM nodejs target
    dir: bindings/wasm
    sources:
      - src/**/*.rs
      - Cargo.toml
      - ../../Cargo.toml
      - ../../crates/docoxide/src/**/*.rs
      - ../../crates/docoxide/Cargo.toml
      - ../../vendor/blitz/packages/*/src/**/*.rs
      - ../../vendor/parley/*/src/**/*.rs
    generates:
      - pkg-nodejs/docoxide_wasm.js
    cmds:
      - wasm-pack build --target nodejs --out-dir pkg-nodejs
      - npm install --silent

  build:python:
    desc: Build Python extension
    dir: bindings/python
    sources:
      - src/**/*.rs
      - Cargo.toml
      - ../../Cargo.toml
      - ../../crates/docoxide/src/**/*.rs
      - ../../crates/docoxide/Cargo.toml
      - ../../vendor/blitz/packages/*/src/**/*.rs
      - ../../vendor/parley/*/src/**/*.rs
    cmds:
      - uv run --with maturin maturin develop --release --quiet

  test:rust:
    desc: Run Rust tests
    cmds:
      - cargo test -p docoxide --test convert -- --test-threads=1

  test:python:
    desc: Run Python tests
    deps: [build:python]
    dir: bindings/python
    cmds:
      - uv run --with pytest pytest tests/test_api.py -q

  test:wasm:
    desc: Run WASM tests via Node.js
    deps: [build:wasm]
    cmds:
      - node --test bindings/wasm/tests/api.test.js

  tag:
    desc: Create release tags (e.g. `task tag -- python --dry-run`). See scripts/tag.py --help.
    cmds:
      - uv run --project scripts scripts/tag.py {{.CLI_ARGS}}

  bump:
    desc: Bump the version of one or all bindings (e.g. `task bump -- wasm patch`). See scripts/bump.py --help.
    cmds:
      - uv run --project scripts scripts/bump.py {{.CLI_ARGS}}
