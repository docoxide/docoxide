<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 1in;
  font-family: 'Noto Sans', sans-serif;
}
.page-break {
  break-before: page;
}
</style>
</head>
<body>
  <h1>Page 1</h1>
  <p>Content on the first page.</p>

  <div class="page-break">
    <h1>Page 2</h1>
    <p>This should appear on a new page via CSS class.</p>
  </div>
</body>
</html>
